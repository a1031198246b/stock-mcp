name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    # 每周一早 02:00 UTC 跑集成测试 (北京 10:00, 避开 A 股开盘 + Yahoo 限流高峰)
    - cron: "0 2 * * 1"

# Force all GitHub Actions to use Node.js 24 instead of the deprecated
# Node.js 20. Required before 2026-06-16 when Node 20 is removed.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync dev dependencies
        # Use explicit `--extra dev` (not `--all-extras`) because
        # the previous attempt with --all-extras installed 80 packages
        # but did NOT include dev extras like pytest. This may be a
        # quirk of how astral-sh/setup-uv@v3 handles the optional
        # dependency groups in CI.
        run: uv sync --extra dev
      - name: Run pytest with coverage
        # Use `python -m pytest` (not bare `pytest`) to avoid the
        # "Failed to spawn: pytest" error seen when uv's PATH resolution
        # doesn't find the console script in the venv.
        run: uv run python -m pytest --cov=stock_mcp --cov-report=term-missing --cov-fail-under=90
        env:
          TDX_PATH: ""

  typecheck:
    runs-on: ubuntu-latest
    # mypy strict 模式 0 errors (2026-06-12 修完), 取消 continue-on-error
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --extra dev
      - run: uv run mypy src/stock_mcp

  # 每周一早 02:00 UTC 跑集成测试 (真实网络), 验证 baostock/eastmoney/sina/tencent 端点还活着.
  # 端点变更/库升级不兼容会**早一周发现** (我们 eastmoney 302 + pz 限制就是这种情况).
  # **只在 schedule 和 manual 触发时跑** (不在 push/pull_request 时跑, 节省 5+ 分钟 CI 时间).
  # continue-on-error: 网络偶发挂不应阻塞 PR, 失败发邮件/slack 由 repo owner 配置.
  integration-tests-weekly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync dev dependencies
        run: uv sync --extra dev
      - name: Run integration tests against real data sources
        env:
          # 启用 4 个真实数据源集成测试
          RUN_BAOSTOCK_TESTS: "1"
          RUN_EASTMONEY_TESTS: "1"
          RUN_SINA_TESTS: "1"
          RUN_TENCENT_TESTS: "1"
          # yfinance 默认 skip (国内被限), 想海外跑可设 RUN_YFINANCE_TESTS=1
          TDX_PATH: ""
        run: |
          uv run python -m pytest tests/integration/ \
            -v --tb=short --maxfail=20 \
            -p no:cacheprovider 2>&1 | tee integration-test.log
      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-log
          path: integration-test.log
          retention-days: 30
      - name: Summarize results
        if: always()
        run: |
          echo "### Integration Tests Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f integration-test.log ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "^(PASSED|FAILED|ERROR|tests/integration|=+ [0-9]+)" integration-test.log | tail -50 >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
